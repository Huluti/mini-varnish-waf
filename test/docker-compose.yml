services:
  # Backend web server
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
    networks:
      - test-net
    healthcheck:
      test: ["CMD-SHELL", "ls /var/run/nginx.pid || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3

  varnish:
    image: varnish:latest
    ports:
      - "6081:6081"
      - "6082:6082"
    volumes:
      - ./varnish-config.vcl:/etc/varnish/default.vcl:ro
    environment:
      VARNISH_SIZE: 256m
    command: >
      varnishd
      -F
      -a :6081
      -T :6082
      -f /etc/varnish/default.vcl
      -s malloc,256m
    networks:
      - test-net
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "varnishstat", "-1"]
      interval: 5s
      timeout: 3s
      retries: 3

networks:
  test-net:
    driver: bridge
