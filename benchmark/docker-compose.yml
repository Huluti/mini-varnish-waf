services:
  # Backend web server
  nginx:
    image: nginx:latest
    container_name: benchmark-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
    networks:
      - benchmark-net
    healthcheck:
      test: ["CMD-SHELL", "ls /var/run/nginx.pid || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3

  # Varnish instance 1 - Without WAF
  varnish1:
    image: varnish:latest
    container_name: varnish-config1
    ports:
      - "6081:6081"
      - "6082:6082"
    volumes:
      - ./varnish-config1.vcl:/etc/varnish/default.vcl:ro
    environment:
      VARNISH_SIZE: 256m
    command: >
      varnishd
      -F
      -a :6081
      -T :6082
      -f /etc/varnish/default.vcl
      -s malloc,256m
    networks:
      - benchmark-net
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "varnishstat", "-1"]
      interval: 5s
      timeout: 3s
      retries: 3

  # Varnish instance 2 - With WAF
  varnish2:
    image: varnish:latest
    container_name: varnish-config2
    ports:
      - "6083:6083"
      - "6084:6084"
    volumes:
      - ./varnish-config2.vcl:/etc/varnish/default.vcl:ro
    environment:
      VARNISH_SIZE: 256m
    command: >
      varnishd
      -F
      -a :6083
      -T :6084
      -f /etc/varnish/default.vcl
      -s malloc,256m
    networks:
      - benchmark-net
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "varnishstat", "-1"]
      interval: 5s
      timeout: 3s
      retries: 3

networks:
  benchmark-net:
    driver: bridge
